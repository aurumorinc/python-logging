name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Bump Version and Release
    runs-on: ubuntu-latest
    # Prevent infinite loops if the commit was made by this action
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bumpver
          
      - name: Install git-cliff
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --version
          
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Bump version
        run: |
          bumpver update --no-commit
          
      - name: Extract new version
        id: get_version
        run: |
          # Extract version from pyproject.toml
          NEW_VERSION=$(grep -oP '(?<=version = ")[^"]*' pyproject.toml)
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Extracted version: $NEW_VERSION"
          
      - name: Generate Changelog
        run: |
          git-cliff --tag ${{ env.NEW_VERSION }} -o CHANGELOG.md
          
      - name: Commit and Push
        run: |
          git add pyproject.toml src/python_logging/__init__.py CHANGELOG.md
          git commit -m "chore: release ${{ env.NEW_VERSION }}"
          git tag ${{ env.NEW_VERSION }}
          git push origin main --tags
          
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.NEW_VERSION }}
          name: Release ${{ env.NEW_VERSION }}
          bodyFile: "CHANGELOG.md"
          token: ${{ secrets.GITHUB_TOKEN }}
